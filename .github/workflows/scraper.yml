name: TransferMap Scraper

on:
  schedule:
    - cron: '*/30 * * * *'  # RSS ogni 30 minuti
    - cron: '0 2 * * *'     # Job notturno alle 02:00
    - cron: '0 3 * * 1'     # FIGC ogni lunedì alle 03:00
  workflow_dispatch:         # Avvio manuale dalla dashboard

jobs:
  rss:
    name: RSS Scraper
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install -r backend/requirements.txt
      - name: Esegui RSS scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: cd backend && PYTHONPATH=. python3 scrapers/rss_scraper.py

  nightly:
    name: Job Notturno
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install -r backend/requirements.txt
      - name: Transfermarkt scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: cd backend && PYTHONPATH=. python3 scrapers/transfermarkt_scraper.py
      - name: Calcolo score
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: cd backend && PYTHONPATH=. python3 utils/score_calculator.py
      - name: Generazione grafo
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: cd backend && PYTHONPATH=. python3 utils/graph_builder.py

  figc:
    name: FIGC Settimanale
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install -r backend/requirements.txt
      - name: FIGC scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: cd backend && PYTHONPATH=. python3 scrapers/figc_scraper.py
